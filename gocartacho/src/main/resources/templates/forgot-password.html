<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña — GO CARTACHO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-icon"><i class="fas fa-key"></i></div>
                <h1>Recuperar <span>Contraseña</span></h1>
                <p class="login-subtitle">Te enviaremos un enlace seguro para restablecerla.</p>
            </div>
            <form id="forgot-password-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>
                <div id="alert-message"
                    style="display:none; text-align:center; margin-bottom:15px; font-weight:600; font-size:0.85rem; padding: 10px; border-radius: 5px;">
                </div>
                <button type="submit" class="btn-submit" id="btn-submit">Enviar enlace</button>
            </form>
            <div class="divider"></div>
            <div class="back-link">
                <a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Volver a Iniciar Sesión</a>
            </div>
        </div>
    </div>
    <script th:src="@{/js/forgot-password.js}"></script>
</body>

</html>
