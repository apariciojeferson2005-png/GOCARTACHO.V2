<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — GO CARTACHO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #009EE3;
            --accent-hover: #007bb2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Muralla sutil de fondo */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('/images/cartagena_bg.png');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            z-index: -1;
        }

        .error-container {
            max-width: 600px;
            padding: 40px;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        .tacho-img {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            margin: 0 0 10px 0;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--accent), #0284c7);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 158, 227, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 158, 227, 0.5);
            background: linear-gradient(135deg, var(--accent-hover), #0369a1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>
    <div class="error-container">
        <img th:src="@{/images/Tacho-ERROR404.png}" alt="Tacho Error 404" class="tacho-img">
        <h1>404</h1>
        <h2>¡Tacho se perdió en las murallas!</h2>
        <p>Parece que la página que estás buscando no existe o fue movida. No te preocupes, Tacho te ayudará a regresar a la ruta correcta.</p>
        <a href="/" class="btn-home"><i class="fas fa-map-marked-alt"></i> Volver al Mapa</a>
    </div>
</body>

</html>
