<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        th:content="'Detalle del plan ' + ${plan.nombrePlan} + ' — Itinerario turístico en Cartagena de Indias con GO CARTACHO'">
    <title th:text="'GO CARTACHO — ' + ${plan.nombrePlan}">GO CARTACHO — Detalle del Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/planes.css}">
    <style>
        .plan-detalle-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .plan-detalle-hero {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        .plan-detalle-hero img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        .plan-detalle-hero .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 25px 25px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        }

        .plan-detalle-hero .hero-overlay h1 {
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin: 0 0 6px;
        }

        .plan-detalle-hero .hero-overlay .plan-meta {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9rem;
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .plan-detalle-body {
            background: var(--bg-card, rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border, rgba(255, 255, 255, 0.08));
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .plan-detalle-body h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--accent2, #e07a5f);
            font-size: 1.3rem;
            margin: 0 0 15px;
        }

        .plan-detalle-body p {
            color: var(--text, #e2e8f0);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .paradas-section h2 {
            margin-bottom: 20px;
        }

        .parada-item {
            display: flex;
            gap: 18px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.06));
            border-radius: 12px;
            margin-bottom: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .parada-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .parada-numero {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: linear-gradient(135deg, var(--accent2, #e07a5f), #c96449);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
        }

        .parada-info h4 {
            color: var(--text, #e2e8f0);
            margin: 0 0 6px;
            font-size: 1rem;
        }

        .parada-info p {
            color: var(--muted, rgba(255, 255, 255, 0.55));
            font-size: 0.85rem;
            margin: 0;
            line-height: 1.5;
        }

        .btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
            color: var(--text, #e2e8f0);
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .plan-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #f5c542;
            font-weight: 600;
        }

        #plan-map {
            height: 300px;
            border-radius: 14px;
            margin-top: 20px;
            border: 1px solid var(--border, rgba(255, 255, 255, 0.08));
        }

        .empty-paradas {
            text-align: center;
            padding: 40px;
            color: var(--muted, rgba(255, 255, 255, 0.5));
        }

        .empty-paradas i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <nav class="navbar" role="navigation" aria-label="Navegación principal">
        <a class="logo" th:href="@{/}">
            <img th:src="@{/images/Logo_GC.png}" alt="Go Cartacho Logo" class="logo-img"> <span
                class="logo-text">GOCARTACHO</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/mapa}"><i class="fas fa-map"></i> Mapa</a>
            <a th:href="@{/planes}" class="active"><i class="fas fa-route"></i> Planes</a>
            <a href="/login" id="btn-login-nav"><i class="fas fa-user-circle"></i> Ingresar</a>
        </div>
    </nav>

    <main class="plan-detalle-container">

        <div class="plan-detalle-hero">
            <img th:src="${plan.nombrePlan.contains('Colonial') || plan.nombrePlan.contains('Clásica') || plan.nombrePlan.contains('Histórica') ? 'https://cdn.yate.co/img/blog/2023/1/plaza-santo-domingo-ctg-0psx640.jpg' : 
                          (plan.nombrePlan.contains('Getsemaní') ? 'https://cdn.yate.co/img/blog/2023/1/getsemani-cartagena-zopx640.jpg' : 
                          (plan.nombrePlan.contains('Sabores') || plan.nombrePlan.contains('Gastronómico') ? 'https://cdn.yate.co/img/blog/2023/1/cafe-del-mar-u4ox640.jpg' : 
                          (plan.nombrePlan.contains('Nocturna') || plan.nombrePlan.contains('Bares') ? 'https://cdn.yate.co/img/blog/2023/1/yate-de-noche-ctg-pntx640.jpg' : 
                          'https://cdn.yate.co/img/blog/2023/1/imagen-ppal-3dcx640.jpg')))}"
                th:alt="${plan.nombrePlan}" />
            <div class="hero-overlay">
                <h1 th:text="${plan.nombrePlan}">Nombre del Plan</h1>
                <div class="plan-meta">
                    <span><i class="fas fa-walking"></i> Itinerario curado</span>
                    <span class="plan-rating" th:if="${plan.promedioCalificacion != null && plan.promedioCalificacion > 0}">
                        <i class="fas fa-star"></i>
                        <span th:text="${#numbers.formatDecimal(plan.promedioCalificacion, 1, 1)}">4.5</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="plan-detalle-body">
            <h2><i class="fas fa-info-circle"></i> Sobre este plan</h2>
            <p th:text="${plan.descripcion}">Descripción del plan...</p>
        </div>

        <div class="plan-detalle-body paradas-section">
            <h2><i class="fas fa-map-signs"></i> Paradas del itinerario</h2>
            <div id="paradas-lista">
                <div class="empty-paradas">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando paradas...</p>
                </div>
            </div>
            <div id="plan-map"></div>
        </div>

        <a th:href="@{/planes}" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Volver a Planes
        </a>

    </main>

    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script th:inline="javascript">
        const planId = /*[[${plan.planId}]]*/ '';
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            cargarParadasPlan();
        });

        async function cargarParadasPlan() {
            const container = document.getElementById('paradas-lista');
            try {
                const res = await fetch(`/api/v1/planes/${planId}/comercios`);
                if (!res.ok) throw new Error('No se pudieron cargar las paradas');
                const paradas = await res.json();

                if (!paradas || paradas.length === 0) {
                    container.innerHTML = `<div class="empty-paradas"><i class="fas fa-route"></i><p>Este plan aún no tiene paradas asignadas.</p></div>`;
                    return;
                }

                let html = '';
                const coords = [];
                paradas.forEach((p, i) => {
                    html += `<div class="parada-item">
                        <div class="parada-numero">${i + 1}</div>
                        <div class="parada-info">
                            <h4>${p.nombreComercio || 'Parada ' + (i + 1)}</h4>
                            <p>${p.recomendacion || p.direccion || 'Disfruta de esta experiencia única.'}</p>
                        </div>
                    </div>`;
                    if (p.latitud && p.longitud) {
                        coords.push([p.latitud, p.longitud, p.nombreComercio || 'Parada ' + (i + 1)]);
                    }
                });
                container.innerHTML = html;

                // Inicializar mapa si hay coordenadas
                if (coords.length > 0 && typeof L !== 'undefined') {
                    const map = L.map('plan-map').setView([coords[0][0], coords[0][1]], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap & CartoDB'
                    }).addTo(map);

                    const markers = [];
                    coords.forEach(([lat, lng, nombre], idx) => {
                        const marker = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>${idx + 1}. ${nombre}</b>`);
                        markers.push([lat, lng]);
                    });

                    if (markers.length > 1) {
                        L.polyline(markers, { color: '#e07a5f', weight: 3, dashArray: '8,8' }).addTo(map);
                        map.fitBounds(L.latLngBounds(markers), { padding: [30, 30] });
                    }
                } else {
                    document.getElementById('plan-map').style.display = 'none';
                }
            } catch (err) {
                container.innerHTML = `<div class="empty-paradas"><i class="fas fa-exclamation-triangle"></i><p>No se pudieron cargar las paradas de este plan.</p></div>`;
                document.getElementById('plan-map').style.display = 'none';
            }
        }
    </script>
</body>

</html>
