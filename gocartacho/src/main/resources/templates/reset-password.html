<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — GO CARTACHO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-icon"><i class="fas fa-lock-open"></i></div>
                <h1>Nueva <span>Contraseña</span></h1>
                <p class="login-subtitle">Asegúrate de crear una contraseña fuerte.</p>
            </div>
            <form id="reset-password-form">
                <!-- Token inyectado por Thymeleaf desde la URL -->
                <input type="hidden" id="token" th:value="${token}">

                <div class="form-group password-wrapper">
                    <label for="nuevaContrasena">Nueva Contraseña</label>
                    <input type="password" id="nuevaContrasena" required minlength="6"
                        placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group password-wrapper">
                    <label for="confirmarContrasena">Confirmar Contraseña</label>
                    <input type="password" id="confirmarContrasena" required minlength="6"
                        placeholder="Repite la contraseña">
                </div>
                <div id="alert-message"
                    style="display:none; text-align:center; margin-bottom:15px; font-weight:600; font-size:0.85rem; padding: 10px; border-radius: 5px;">
                </div>
                <button type="submit" class="btn-submit" id="btn-submit">Guardar Contraseña</button>
            </form>
        </div>
    </div>
    <script th:src="@{/js/reset-password.js}"></script>
</body>

</html>
