<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en GO CARTACHO y descubre Cartagena de Indias">
    <title>Ingresar — GO CARTACHO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">

            <div class="login-brand" style="position: relative;">
                <img th:src="@{/images/Tacho-mascota.png}" alt="Tacho Mascota" class="login-logo-img" style="border-radius: 0; width: 100px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.15)); animation: float 3s ease-in-out infinite;">
                <h1>Go <span>Cartacho</span></h1>
                <p class="login-subtitle">La ciudad te espera — entra y explórala</p>
            </div>

            <div id="error-message" class="error-msg" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Usuario o contraseña incorrectos.</span>
            </div>

            <div th:if="${param.logout}" class="success-msg"
                style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; border: 1px solid rgba(16, 185, 129, 0.2); text-align: center;">
                <i class="fas fa-check-circle"></i> Sesión cerrada correctamente.
            </div>

            <a href="/oauth2/authorization/google" class="btn-google">
                <i class="fab fa-google"></i> Continuar con Google
            </a>

            <div class="divider">o usa tu cuenta de Cartacho</div>

            <form id="loginForm" novalidate>
                <input type="hidden" id="redirect-url" th:value="${targetUrl}" />

                <div class="form-group">
                    <label for="identificador">Correo o Usuario</label>
                    <input type="text" id="identificador" required placeholder="tu@correo.com o tu usuario"
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required placeholder="••••••••"
                            autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePwd" aria-label="Mostrar contraseña">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <i class="fas fa-sign-in-alt"></i> Ingresar con mi cuenta
                </button>
            </form>

            <div class="links">
                ¿Aún no tienes cuenta? <a href="/registro">Regístrate ahora</a>
            </div>

            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <a href="/" class="btn-guest"
                    style="display: block; text-align: center; padding: 12px; border-radius: 8px; border: 1px dashed var(--text-light); color: var(--text-light); text-decoration: none; font-size: 0.85rem; transition: all 0.3s;">
                    <i class="fas fa-eye"></i> Continuar como invitado (sin cuenta)
                </a>
            </div>
            <div class="back-link">
                <a href="/"><i class="fas fa-map-marked-alt"></i> Volver al mapa</a>
            </div>

        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
</body>

</html>
