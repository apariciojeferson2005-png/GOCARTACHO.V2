spring.application.name=gocartacho

# Perfil activo: Railway no inyecta esta variable, así que por defecto se usa 'dev' (carga DataLoader)
# En Railway, configura SPRING_PROFILES_ACTIVE=prod para deshabilitar la carga de datos de prueba
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Puerto: Railway inyecta $PORT automáticamente
server.port=${PORT:8080}

spring.thymeleaf.cache=true

# =============================================
# JWT
# =============================================
jwt.secret=${JWT_SECRET:un_secreto_por_defecto_para_desarrollo_local_muy_seguro_1234567890}

# =============================================
# SESIONES
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.max-age=1800

# =============================================
# MongoDB
# (Configuracion de conexion movida a application.yml para soporte localhost)
# =============================================
spring.data.mongodb.auto-index-creation=true

# =============================================
# MySQL
# (Configuracion de conexion movida a application.yml para soporte localhost)
# =============================================

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# =============================================
# CACHÉ (Caffeine local)
# =============================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=10m,maximumSize=500

# =============================================
# COMPRESIÓN
# =============================================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# =============================================
# HEATMAP
# =============================================
gocartacho.heatmap.business-radius-km=0.1
gocartacho.heatmap.threshold.low=2
gocartacho.heatmap.threshold.medium=8

# =============================================
# OAUTH2 GOOGLE
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google_id_local}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google_secret_local}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# =============================================
# EMAIL
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dummy@gmail.com}
spring.mail.password=${MAIL_PASSWORD:dummy_pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# URL DEL FRONTEND (para links en emails de recuperación de contraseña)
# =============================================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:8080}
